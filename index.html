<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>HistoDaily</title><style>
:root{--bg:#0f172a;--card:#111c33;--muted:#94a3b8;--text:#f8fafc;--accent:#22c55e;--accent2:#38bdf8;--danger:#fb7185}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#0b1120,#111827);color:var(--text)}.app{max-width:520px;margin:auto;min-height:100vh;padding:18px 16px 86px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{font-weight:900;font-size:25px}.pill{background:#1e293b;border:1px solid #334155;border-radius:999px;padding:8px 12px;font-weight:800}.card{background:rgba(17,28,51,.95);border:1px solid #263449;border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 12px 32px rgba(0,0,0,.25)}h1,h2,h3{margin:0 0 10px}p{line-height:1.45;color:#dbeafe}.muted{color:var(--muted);font-size:14px}.btn{width:100%;border:0;border-radius:16px;padding:15px 16px;margin:8px 0;font-weight:900;font-size:16px;background:#23324d;color:white}.btn.primary{background:linear-gradient(135deg,var(--accent),#16a34a);color:#052e16}.btn.secondary{background:#10243c}.btn:active{transform:scale(.99)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.progress{height:12px;background:#243044;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0}.nav{position:fixed;left:0;right:0;bottom:0;background:#0b1120cc;backdrop-filter:blur(14px);border-top:1px solid #243044}.navin{max-width:520px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px}.nav button{border:0;background:transparent;color:#cbd5e1;padding:10px 2px;border-radius:14px;font-weight:800}.nav button.active{background:#1e293b;color:white}.choice{border:1px solid #334155;background:#17233a}.good{background:#14532d!important}.bad{background:#7f1d1d!important}.lessonText{font-size:18px}.small{font-size:13px}.tag{display:inline-block;padding:6px 9px;border-radius:999px;background:#1e293b;color:#bae6fd;margin:4px 4px 0 0}.timeline{border-left:3px solid #38bdf8;padding-left:14px}.event{margin:12px 0}.hidden{display:none}a{color:#7dd3fc}.toast{position:fixed;left:16px;right:16px;bottom:76px;background:#052e16;border:1px solid #22c55e;color:white;padding:14px;border-radius:18px;text-align:center;font-weight:900;display:none}.toast.show{display:block}
</style></head><body><div class="app"><div class="top"><div><div class="brand">HistoDaily</div><div class="muted">5 minutes d’histoire par jour</div></div><div class="pill" id="xpPill">0 XP</div></div><main id="screen"></main></div><div class="nav"><div class="navin"><button data-tab="home">Accueil</button><button data-tab="path">Parcours</button><button data-tab="review">Réviser</button><button data-tab="profile">Profil</button></div></div><div id="toast" class="toast"></div><script>
const lessons=[
{era:'Préhistoire',title:'Pourquoi la Préhistoire commence avant l’écriture',wiki:'https://fr.wikipedia.org/wiki/Pr%C3%A9histoire',text:"La Préhistoire désigne l’immense période qui précède l’invention de l’écriture. On la connaît grâce aux ossements, aux outils, aux traces de feu, aux peintures et aux habitats retrouvés par les archéologues. Elle n’est pas une époque primitive au sens idiot du terme : les humains y inventent des techniques, des formes d’organisation et des façons de transmettre des savoirs.",facts:['Pas de textes directs','Archéologie essentielle','Durée immense'],q:'Pourquoi la Préhistoire est-elle difficile à connaître ?',choices:['Parce qu’il n’y a presque pas de sources écrites','Parce qu’elle a duré 20 ans','Parce que les humains n’existaient pas'],answer:0},
{era:'Préhistoire',title:'Le Néolithique : cultiver et s’installer',wiki:'https://fr.wikipedia.org/wiki/N%C3%A9olithique',text:"Le Néolithique transforme profondément les sociétés humaines. Des groupes commencent à cultiver des plantes, domestiquer des animaux et vivre plus durablement au même endroit. Cela favorise les villages, les réserves, la spécialisation des tâches, mais aussi les inégalités et les tensions autour des ressources.",facts:['Agriculture','Sédentarisation','Villages'],q:'Quel changement majeur caractérise le Néolithique ?',choices:['L’agriculture et la sédentarisation','La découverte de l’Amérique','La naissance d’Internet'],answer:0},
{era:'Antiquité',title:'Les cités grecques',wiki:'https://fr.wikipedia.org/wiki/Cit%C3%A9_grecque',text:"La Grèce antique n’est pas un pays unifié. Elle est composée de cités indépendantes comme Athènes, Sparte ou Corinthe. Chaque cité possède ses institutions, ses lois, son territoire et ses rivalités. Cette fragmentation explique à la fois la richesse politique du monde grec et ses conflits permanents.",facts:['Athènes','Sparte','Cités indépendantes'],q:'Une cité grecque est surtout…',choices:['Un État indépendant autour d’une ville','Une province romaine','Un château médiéval'],answer:0},
{era:'Antiquité',title:'Rome : de la République à l’Empire',wiki:'https://fr.wikipedia.org/wiki/Rome_antique',text:"Rome commence comme une cité, puis devient une République dominée par des magistrats, le Sénat et des assemblées. Les conquêtes enrichissent Rome mais créent aussi des tensions sociales et militaires. Les généraux deviennent puissants. Après les guerres civiles, Auguste installe un nouveau régime : l’Empire.",facts:['République','Conquêtes','Auguste'],q:'Pourquoi Rome bascule-t-elle vers l’Empire ?',choices:['À cause des tensions et guerres civiles','Parce que Rome perd toutes ses guerres','Parce que le Moyen Âge commence'],answer:0},
{era:'Moyen Âge',title:'Le système féodal',wiki:'https://fr.wikipedia.org/wiki/F%C3%A9odalit%C3%A9',text:"Au Moyen Âge, le pouvoir est souvent fragmenté. Des seigneurs contrôlent des terres, protègent des populations et nouent des liens de fidélité avec d’autres puissants. Le roi existe, mais son autorité est parfois limitée localement. La féodalité est donc un réseau d’obligations, de terres, de protection et de domination.",facts:['Seigneurs','Fiefs','Fidélité'],q:'La féodalité repose surtout sur…',choices:['Des liens de fidélité et des terres','Des élections présidentielles','Des usines'],answer:0},
{era:'Révolution',title:'1789 : pourquoi la Révolution éclate',wiki:'https://fr.wikipedia.org/wiki/R%C3%A9volution_fran%C3%A7aise',text:"La Révolution française naît d’une crise multiple : finances de l’État, inégalités sociales, mauvaises récoltes, colère politique et idées nouvelles sur la souveraineté. En 1789, les États généraux s’ouvrent, puis les députés du tiers état affirment représenter la Nation. Le pouvoir ancien vacille.",facts:['Crise financière','Tiers état','Nation'],q:'La Révolution française éclate dans un contexte de…',choices:['Crise financière, sociale et politique','Paix parfaite','Colonisation de Mars'],answer:0}
];
const $=s=>document.querySelector(s);let state=JSON.parse(localStorage.getItem('histodaily')||'{}');state.xp??=0;state.done??=[];state.streak??=0;state.last??='';state.review??=[];function save(){localStorage.setItem('histodaily',JSON.stringify(state));$('#xpPill').textContent=state.xp+' XP'}function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}function nextLesson(){return lessons.findIndex((_,i)=>!state.done.includes(i));}function setTab(tab){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));({home,path,review,profile}[tab])()}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));function home(){let n=nextLesson();let pct=Math.round(state.done.length/lessons.length*100);$('#screen').innerHTML=`<section class="card"><h1>Bonjour Théo</h1><p class="lessonText">Aujourd’hui : ${n<0?'Parcours terminé':lessons[n].title}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p class="muted">${state.done.length}/${lessons.length} leçons terminées · série ${state.streak} jour(s)</p><button class="btn primary" id="start">${n<0?'Revoir le parcours':'Commencer la leçon'}</button><button class="btn secondary" id="pathBtn">Voir le parcours</button></section><section class="card"><h3>Principe</h3><p>Une micro-leçon, trois idées à retenir, un quiz. Wikipédia sert seulement à approfondir.</p></section>`;$('#start').onclick=()=> n<0?path():lesson(n);$('#pathBtn').onclick=()=>setTab('path')}function path(){let html=`<section class="card"><h2>Parcours chronologique</h2><p class="muted">Les leçons se débloquent dans l’ordre.</p></section>`;lessons.forEach((l,i)=>{let done=state.done.includes(i);let locked=i>0&&!state.done.includes(i-1)&&!done;html+=`<section class="card"><div class="muted">${l.era}</div><h3>${done?'✅ ':locked?'🔒 ':''}${l.title}</h3><button class="btn ${locked?'':'primary'}" data-lesson="${i}" ${locked?'disabled':''}>${done?'Relire':'Ouvrir'}</button></section>`});$('#screen').innerHTML=html;document.querySelectorAll('[data-lesson]').forEach(b=>b.onclick=()=>lesson(Number(b.dataset.lesson)))}function lesson(i){const l=lessons[i];$('#screen').innerHTML=`<section class="card"><div class="muted">${l.era}</div><h1>${l.title}</h1><p class="lessonText">${l.text}</p><div>${l.facts.map(f=>`<span class="tag">${f}</span>`).join('')}</div><p><a href="${l.wiki}" target="_blank" rel="noopener">Lire sur Wikipédia</a></p><button class="btn primary" id="quiz">Faire le quiz</button><button class="btn" id="back">Retour</button></section>`;$('#quiz').onclick=()=>quiz(i);$('#back').onclick=()=>setTab('path')}function quiz(i){const l=lessons[i];$('#screen').innerHTML=`<section class="card"><h2>Quiz</h2><p class="lessonText">${l.q}</p>${l.choices.map((c,k)=>`<button class="btn choice" data-choice="${k}">${c}</button>`).join('')}<button class="btn hidden" id="continue">Continuer</button></section>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{let ok=Number(b.dataset.choice)===l.answer;b.classList.add(ok?'good':'bad');if(ok){if(!state.done.includes(i)){state.done.push(i);state.xp+=20;let today=new Date().toDateString();if(state.last!==today){state.streak+=1;state.last=today}state.review.push(i);save();toast('+20 XP')}}else{toast('Raté, relis puis retente')}$('#continue').classList.remove('hidden');$('#continue').onclick=()=>setTab('home')})}function review(){let ids=[...new Set(state.review)].slice(-5);$('#screen').innerHTML=`<section class="card"><h2>Révisions</h2><p>${ids.length?'Revois les dernières notions validées.':'Termine une leçon pour débloquer les révisions.'}</p></section>`+ids.map(i=>`<section class="card"><div class="muted">${lessons[i].era}</div><h3>${lessons[i].title}</h3><button class="btn primary" data-lesson="${i}">Réviser</button></section>`).join('');document.querySelectorAll('[data-lesson]').forEach(b=>b.onclick=()=>lesson(Number(b.dataset.lesson)))}function profile(){let pct=Math.round(state.done.length/lessons.length*100);$('#screen').innerHTML=`<section class="card"><h2>Profil</h2><div class="grid"><div class="card"><h1>${state.xp}</h1><div class="muted">XP</div></div><div class="card"><h1>${state.streak}</h1><div class="muted">jours</div></div></div><p>Progression : ${pct}%</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><button class="btn" id="reset">Réinitialiser</button></section>`;$('#reset').onclick=()=>{if(confirm('Réinitialiser la progression ?')){localStorage.removeItem('histodaily');location.reload()}}}save();setTab('home');
</script></body></html>
